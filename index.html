<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixelShrink - Real-Time Size Prediction</title>
    <style>
        /* [Keeping your robust styling...] */
        body { background: #0f172a; color: #f8fafc; padding: 2rem; font-family: sans-serif; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; }
        .queue-item { display: grid; grid-template-columns: auto 1fr auto; gap: 1rem; background: #0f172a; padding: 0.75rem; margin-bottom: 0.5rem; border-radius: 6px; align-items: center; }
        .size-tag { font-family: monospace; color: #38bdf8; font-weight: bold; }
        .est-size { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="card">
        <h1>PixelShrink Engine</h1>
        <div class="control-row">
            <label>Target Quality: <span id="qualityValDisplay">80%</span></label>
            <input type="range" id="compressionQuality" min="5" max="100" value="80" oninput="updatePredictions()">
        </div>
        <input type="file" id="imageInput" multiple onchange="handleImageSelection()">
        <div id="queueRenderContainer"></div>
        <button class="btn-action" onclick="executeBatchCompression()">⚡ Optimize & Shrink</button>
    </div>

    <script>
        let imagePipelineQueue = [];

        function updatePredictions() {
            const quality = document.getElementById('compressionQuality').value;
            document.getElementById('qualityValDisplay').innerText = quality + '%';
            // Trigger recalculation for all files in queue
            renderPipelineQueueTable();
        }

        async function estimateSize(file, quality) {
            // Predict size using a small canvas sample
            const img = new Image();
            img.src = URL.createObjectURL(file);
            await img.decode();
            const canvas = document.createElement('canvas');
            canvas.width = 100; canvas.height = 100;
            canvas.getContext('2d').drawImage(img, 0, 0, 100, 100);
            const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', quality / 100));
            // Extrapolate (Sample ratio * Total pixels)
            return Math.round((blob.size / 10000) * (img.width * img.height));
        }

        function handleImageSelection() {
            const files = Array.from(document.getElementById('imageInput').files);
            imagePipelineQueue = files.map(f => ({ file: f, id: Math.random() }));
            renderPipelineQueueTable();
        }

        async function renderPipelineQueueTable() {
            const container = document.getElementById('queueRenderContainer');
            const quality = document.getElementById('compressionQuality').value;
            
            container.innerHTML = '';
            for (let item of imagePipelineQueue) {
                const est = await estimateSize(item.file, quality);
                container.innerHTML += `
                    <div class="queue-item">
                        <span>${item.file.name}</span>
                        <span class="size-tag">Orig: ${(item.file.size/1024).toFixed(1)} KB</span>
                        <span class="est-size">Est: ${(est/1024).toFixed(1)} KB</span>
                    </div>
                `;
            }
        }

        async function executeBatchCompression() {
            const quality = document.getElementById('compressionQuality').value / 100;
            for (let item of imagePipelineQueue) {
                const img = new Image();
                img.src = URL.createObjectURL(item.file);
                await img.decode();
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                canvas.toBlob(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `optimized_${item.file.name}`;
                    link.click();
                }, 'image/jpeg', quality);
            }
        }
    </script>
</body>
</html>
