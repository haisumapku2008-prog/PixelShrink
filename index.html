<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixelShrink - Batch Image Optimizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 2rem; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; }
        .queue-item { display: flex; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid #334155; }
        .btn { background: #0284c7; color: white; padding: 0.8rem 1.5rem; border: none; border-radius: 6px; cursor: pointer; }
        .size-tag { font-family: monospace; color: #38bdf8; }
        .post-size { color: #34d399; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h1>PixelShrink Engine</h1>
        <input type="file" id="imageInput" multiple onchange="handleFiles()">
        <div id="queue"></div>
        <button class="btn" onclick="processAll()">Optimize All</button>
    </div>

    <script>
        let queue = [];
        
        function handleFiles() {
            const files = Array.from(document.getElementById('imageInput').files);
            queue = files.map(f => ({ file: f, id: Math.random() }));
            render();
        }

        function render() {
            const container = document.getElementById('queue');
            container.innerHTML = queue.map(item => `
                <div class="queue-item">
                    <span>${item.file.name}</span>
                    <span class="size-tag" id="size_${item.id}">Orig: ${(item.file.size/1024).toFixed(1)} KB</span>
                </div>
            `).join('');
        }

        async function processAll() {
            for (let item of queue) {
                const img = new Image();
                img.src = URL.createObjectURL(item.file);
                await img.decode();
                
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                
                canvas.toBlob(blob => {
                    const el = document.getElementById(`size_${item.id}`);
                    el.innerHTML = `Orig: ${(item.file.size/1024).toFixed(1)} KB ➡️ <span class="post-size">New: ${(blob.size/1024).toFixed(1)} KB</span>`;
                }, 'image/jpeg', 0.8);
            }
        }
    </script>
</body>
</html>
