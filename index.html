<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PixelShrink - Batch Image Optimizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: #0f172a; color: #f8fafc; padding: 2rem 1rem; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .card { background: #1e293b; padding: 1.5rem; border-radius: 12px; border: 1px solid #334155; width: 100%; max-width: 600px; }
        .queue-item { display: flex; justify-content: space-between; padding: 0.75rem; border-bottom: 1px solid #334155; font-family: monospace; font-size: 0.9rem; }
        .size-tag { color: #38bdf8; }
        .est-tag { color: #fbbf24; margin-left: 10px; }
        .btn-action { background: #0284c7; color: white; border: none; padding: 0.85rem 1.5rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>PixelShrink Engine</h1>
        <input type="file" id="imageInput" multiple onchange="handleFiles()">
        <div id="queue"></div>
        <button class="btn-action" onclick="processAll()">⚡ Optimize & Shrink</button>
    </div>

    <script>
        let queue = [];
        function handleFiles() {
            const files = Array.from(document.getElementById('imageInput').files);
            queue = files.map(f => ({ file: f, id: Math.random() }));
            render();
        }

        function render() {
            const container = document.getElementById('queue');
            container.innerHTML = queue.map(item => `
                <div class="queue-item">
                    <span>${item.file.name}</span>
                    <span>
                        <span class="size-tag">${(item.file.size/1024).toFixed(1)} KB</span>
                        <span class="est-tag" id="est_${item.id}">...</span>
                    </span>
                </div>
            `).join('');
            
            // Trigger background estimation
            queue.forEach(item => {
                const img = new Image();
                img.src = URL.createObjectURL(item.file);
                img.onload = () => {
                    const est = Math.round(item.file.size * 0.4); // Simplified estimation heuristic
                    document.getElementById(`est_${item.id}`).innerText = `Est: ${(est/1024).toFixed(1)} KB`;
                };
            });
        }

        async function processAll() {
            for (let item of queue) {
                const img = new Image();
                img.src = URL.createObjectURL(item.file);
                await img.decode();
                const canvas = document.createElement('canvas');
                canvas.width = img.width; canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                canvas.toBlob(blob => {
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = `optimized_${item.file.name}`;
                    link.click();
                }, 'image/jpeg', 0.8);
            }
        }
    </script>
</body>
</html>
